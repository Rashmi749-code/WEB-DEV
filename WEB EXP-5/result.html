<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Quiz Master - Result</title>
</head>
<body>
    <div class="container">
        <h1>Your Result</h1>
        <div class="score-box">
            <p>You scored <strong>{{ score }}</strong> out of {{ total }}</p>
            <h3>{{ feedback }}</h3>
        </div>
        <a href="/" class="btn">Try Again</a>
    </div>
</body>
</html>
