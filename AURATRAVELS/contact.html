<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Contact Us | AuraTravels</title>
</head>
<body>
    <nav>
        <div class="logo">Aura<span>Travels</span></div>
    </nav>

    <section class="contact-container">
        <div class="contact-info">
            <h2>Get In Touch</h2>
            <p>Questions about a destination? Our vibe experts are online 24/7.</p>
            <div class="map-box">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509374!2d144.95373531531615!3d-37.81627977975124!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sTravel%20Agency!5e0!3m2!1sen!2sin!4v1625123456789!5m2!1sen!2sin" width="100%" height="250" style="border:0; border-radius:15px;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

        <div class="contact-form-box">
            <form action="https://formspree.io/f/your-id" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <textarea name="message" placeholder="How can we help?" rows="5"></textarea>
                <button type="submit" class="cta-btn">Send Message</button>
            </form>
        </div>
    </section>
</body>
</html>
