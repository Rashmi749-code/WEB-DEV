<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --gold: #c5a059;
            --soft-white: #fafafa;
            --charcoal: #2c2c2c;
        }
        body { font-family: 'Inter', sans-serif; background: var(--soft-white); color: var(--charcoal); margin: 0; }
        .navbar { padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; background: white; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 50px 10%; }
        .card { border: 1px solid #eee; border-radius: 20px; overflow: hidden; background: white; transition: 0.4s ease; }
        .card:hover { transform: scale(1.02); border-color: var(--gold); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 25px; }
        .aura-tag { font-size: 0.8rem; text-transform: uppercase; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">AuraTravels</div>
    </nav>

    <div class="grid" id="destinations-grid">
        </div>

    <script>
        async function fetchTrips() {
            const response = await fetch('/api/destinations');
            const trips = await response.json();
            const grid = document.getElementById('destinations-grid');

            grid.innerHTML = trips.map(trip => `
                <div class="card">
                    <img src="${trip.image_url}" alt="${trip.name}">
                    <div class="info">
                        <span class="aura-tag">${trip.aura}</span>
                        <h3>${trip.name}</h3>
                        <p>${trip.location}</p>
                        <p><strong>${trip.price}</strong> / night</p>
                    </div>
                </div>
            `).join('');
        }
        fetchTrips();
    </script>
</body>
</html>
